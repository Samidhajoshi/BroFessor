services:
  - type: web
    name: brofessor-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/skillify-backend-1.0.0.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

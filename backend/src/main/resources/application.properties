# ============================================================
# Brofessor Backend Configuration
# ============================================================

server.port=${PORT:8080}

# --- MySQL ---

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/brofessor?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- JWT ---
jwt.secret=${JWT_SECRET:dev-only-change-me-brofessor-secret-key-please-replace-1234567890}
jwt.expiration-ms=86400000

# --- CORS ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- File Uploads ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Cloudinary ---

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# --- Logging ---
logging.level.org.springframework.security=WARN
logging.level.com.skillify=INFO
